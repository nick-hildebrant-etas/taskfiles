version: "3"

dotenv: [".taskfiles/.env"]

vars:
  repo: "https://github.com/nick-hildebrant-etas/taskfiles"
  taskfiles_dir: "{{.HOME}}/.taskfiles"
  home_dir: "{{.taskfiles_dir}}/home"
  brewfile: "{{.taskfiles_dir}}/Brewfile"
  hooks_src: "{{.taskfiles_dir}}/hooks"
  hooks_dst: "{{.taskfiles_dir}}/.git/hooks"
  env_file: "{{.taskfiles_dir}}/.env"

includes:
  secrets:
    taskfile: "{{.HOME}}/.taskfiles/secrets.yml"
    optional: true
  repos:
    taskfile: "{{.HOME}}/.taskfiles/repos.yml"
    optional: true

tasks:
  default:
    desc: Checkout repo and link dotfiles
    cmds:
      - task: checkout
      - task: link

  checkout:
    desc: Clone or update repo at {{.taskfiles_dir}}
    cmds:
      - |
        if [ -d "{{.taskfiles_dir}}/.git" ]; then
          echo "Updating {{.taskfiles_dir}}..."
          git -C "{{.taskfiles_dir}}" pull
        else
          echo "Cloning {{.repo}} to {{.taskfiles_dir}}..."
          git clone "{{.repo}}" "{{.taskfiles_dir}}"
        fi

  link:
    desc: Symlink dotfiles from {{.home_dir}} into {{.HOME}}, and link Taskfile.yml
    cmds:
      - |
        for f in "{{.home_dir}}"/* "{{.home_dir}}"/.*; do
          name="$(basename "$f")"
          [ "$name" = "." ] || [ "$name" = ".." ] && continue
          [ -e "$f" ] || continue
          ln -sf "$f" "{{.HOME}}/$name"
          echo "Linked $name"
        done
      - ln -sf "{{.taskfiles_dir}}/Taskfile.yml" "{{.HOME}}/Taskfile.yml"
      - echo "Linked Taskfile.yml"

  install:
    desc: Full setup — brew, secrets, git-config, link, hooks
    cmds:
      - task: brew
      - task: secrets:doctor
      - task: secrets:decrypt
      - task: repos:git-credentials
      - task: link
      - task: hooks

  git-config:
    desc: Configure git identity per account (delegates to repos:git-credentials)
    cmds:
      - task: repos:git-credentials

  brew:
    desc: Install Homebrew packages from {{.brewfile}}
    preconditions:
      - sh: command -v brew
        msg: "Homebrew not found — install from https://brew.sh"
    cmds:
      - brew bundle --file="{{.brewfile}}"
    sources:
      - "{{.brewfile}}"

  tmpd:
    desc: Create a temp directory and cd into it
    vars:
      st_pwd:
        sh: mktemp -d
    cmds:
      - echo "{{.st_pwd}}"
      - bash -
    dir: "{{.st_pwd}}"

  hooks:
    desc: Copy hooks from {{.hooks_src}} into {{.hooks_dst}}
    cmds:
      - mkdir -p "{{.hooks_dst}}"
      - cp "{{.hooks_src}}/pre-commit" "{{.hooks_dst}}/pre-commit"
      - chmod +x "{{.hooks_dst}}/pre-commit"
      - echo "Installed pre-commit hook"

  completions:
    desc: Add eval-based completions for bash and zsh to shell rc files
    cmds:
      - task: completions:bash
      - task: completions:zsh

  completions:bash:
    desc: Add task bash completion eval to ~/.bashrc
    vars:
      bashrc: "{{.HOME}}/.bashrc"
      eval_line: 'eval "$(task --completion bash)"'
    preconditions:
      - sh: command -v task
        msg: "task not found — run: task brew"
    cmds:
      - |
        if ! grep -qF 'task --completion bash' "{{.bashrc}}" 2>/dev/null; then
          echo '' >> "{{.bashrc}}"
          echo '# task completions (added by task completions:bash)' >> "{{.bashrc}}"
          echo '{{.eval_line}}' >> "{{.bashrc}}"
          echo "Added bash completion eval to {{.bashrc}}"
        else
          echo "bash completion already present in {{.bashrc}}, skipping"
        fi

  completions:zsh:
    desc: Add task zsh completion eval to ~/.zshrc
    vars:
      zshrc: "{{.HOME}}/.zshrc"
    preconditions:
      - sh: command -v task
        msg: "task not found — run: task brew"
    cmds:
      - |
        if ! grep -qF 'compinit' "{{.zshrc}}" 2>/dev/null; then
          echo '' >> "{{.zshrc}}"
          echo '# zsh completion system' >> "{{.zshrc}}"
          echo 'autoload -Uz compinit && compinit' >> "{{.zshrc}}"
          echo "Added compinit to {{.zshrc}}"
        else
          echo "compinit already present in {{.zshrc}}, skipping"
        fi
      - |
        if ! grep -qF 'task --completion zsh' "{{.zshrc}}" 2>/dev/null; then
          echo '' >> "{{.zshrc}}"
          echo '# task completions (added by task completions:zsh)' >> "{{.zshrc}}"
          echo 'eval "$(task --completion zsh)"' >> "{{.zshrc}}"
          echo "Added zsh completion eval to {{.zshrc}}"
        else
          echo "zsh completion already present in {{.zshrc}}, skipping"
        fi
