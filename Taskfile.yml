version: "3"

dotenv:
  - .env

includes:
  secrets:
    taskfile: ./secrets.yml
    optional: true

vars:
  REPO: "https://github.com/nick-hildebrant-etas/taskfiles"
  TASKFILES_DIR: "{{.HOME}}/.taskfiles"
  HOME_DIR: "{{.TASKFILES_DIR}}/home"

tasks:
  default:
    desc: Checkout repo and link dotfiles
    cmds:
      - task: checkout
      - task: link

  checkout:
    desc: Clone repo to {{.TASKFILES_DIR}} (or pull if already cloned)
    cmds:
      - |
        if [ -d "{{.TASKFILES_DIR}}/.git" ]; then
          echo "Updating {{.TASKFILES_DIR}}..."
          git -C "{{.TASKFILES_DIR}}" pull
        else
          echo "Cloning {{.REPO}} to {{.TASKFILES_DIR}}..."
          git clone "{{.REPO}}" "{{.TASKFILES_DIR}}"
        fi

  link:
    desc: Symlink files from {{.HOME_DIR}} into $HOME, and ~/Taskfile.yml
    cmds:
      - |
        for f in "{{.HOME_DIR}}"/* "{{.HOME_DIR}}"/.*; do
          name="$(basename "$f")"
          [ "$name" = "." ] || [ "$name" = ".." ] && continue
          [ -e "$f" ] || continue
          ln -sf "$f" "{{.HOME}}/$name"
          echo "Linked $name"
        done
      - ln -sf "{{.TASKFILES_DIR}}/Taskfile.yml" "{{.HOME}}/Taskfile.yml"
      - echo "Linked Taskfile.yml"

  install:
    desc: Full setup — brew, secrets, git-config, link, hooks
    cmds:
      - task: brew
      - task: secrets:decrypt
      - task: git-config
      - task: link
      - task: hooks

  git-config:
    desc: Set global git user.name and user.email if unset
    cmds:
      - |
        . "{{.TASKFILES_DIR}}/.env"
        if [ -z "$(git config --global user.email)" ]; then
          git config --global user.email "$GIT_EMAIL"
          echo "Set git user.email to $GIT_EMAIL"
        fi
      - |
        . "{{.TASKFILES_DIR}}/.env"
        if [ -z "$(git config --global user.name)" ]; then
          git config --global user.name "$GIT_NAME"
          echo "Set git user.name to $GIT_NAME"
        fi

  brew:
    desc: Install Homebrew packages from Brewfile
    preconditions:
      - sh: command -v brew
        msg: "Homebrew not found — install from https://brew.sh"
    cmds:
      - brew bundle --file="{{.TASKFILES_DIR}}/Brewfile"
    sources:
      - "{{.TASKFILES_DIR}}/Brewfile"

  hooks:
    desc: Install git hooks from hooks/ into .git/hooks/
    cmds:
      - |
        mkdir -p "{{.TASKFILES_DIR}}/.git/hooks"
        cp "{{.TASKFILES_DIR}}/hooks/pre-commit" "{{.TASKFILES_DIR}}/.git/hooks/pre-commit"
        chmod +x "{{.TASKFILES_DIR}}/.git/hooks/pre-commit"
        echo "Installed pre-commit hook"
