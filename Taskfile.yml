version: "3"

includes:
  secrets:
    taskfile: "{{.HOME}}/.taskfiles/secrets.yml"
    optional: true
  repos:
    taskfile: "{{.HOME}}/.taskfiles/repos.yml"
    optional: true
  completions:
    taskfile: "{{.HOME}}/.taskfiles/completions.yml"
    optional: true
  ebcl:
    taskfile: "{{.HOME}}/.taskfiles/ebcl.yml"
    optional: true

tasks:
  default:
    desc: Checkout repo and link dotfiles
    cmds:
      - task: checkout
      - task: link

  checkout:
    desc: Clone or update the taskfiles repo
    vars:
      repo: '{{.repo | default "https://github.com/eclipse-score/score-task-template"}}'
      dest: '{{.dest | default (printf "%s/.taskfiles" .HOME)}}'
    cmds:
      - |
        if [ -d "{{.dest}}/.git" ]; then
          echo "Updating {{.dest}}..."
          git -C "{{.dest}}" pull
        else
          echo "Cloning {{.repo}} to {{.dest}}..."
          git clone "{{.repo}}" "{{.dest}}"
        fi

  link:
    desc: Symlink dotfiles into $HOME and link Taskfile.yml
    silent: true
    vars:
      home_dir: '{{.home_dir | default (printf "%s/.taskfiles/home" .HOME)}}'
    cmds:
      - |
        for f in "{{.home_dir}}"/* "{{.home_dir}}"/.*; do
          name="$(basename "$f")"
          [ "$name" = "." ] || [ "$name" = ".." ] && continue
          [ -e "$f" ] || continue
          ln -sf "$f" "{{.HOME}}/$name"
          echo "Linked $name"
        done
      - ln -sf "{{.HOME}}/.taskfiles/Taskfile.yml" "{{.HOME}}/Taskfile.yml"
      - echo "Linked Taskfile.yml"

  install:
    desc: Full setup — brew, secrets, git-config, link, hooks
    cmds:
      - task: brew
      - task: secrets:doctor
      - task: repos:git-credentials
      - task: repos:doctor
      - task: link
      - task: hooks

  git-config:
    desc: Configure git identity per account (delegates to repos:git-credentials)
    cmds:
      - task: repos:git-credentials

  brew:
    desc: Install Homebrew packages
    vars:
      brewfile: '{{.brewfile | default (printf "%s/.taskfiles/Brewfile" .HOME)}}'
    preconditions:
      - sh: command -v brew
        msg: "Homebrew not found — install from https://brew.sh"
    cmds:
      - brew bundle --file="{{.brewfile}}"
    sources:
      - "{{.brewfile}}"

  tmpd:
    desc: Create a temp directory and cd into it
    vars:
      st_pwd:
        sh: mktemp -d
    cmds:
      - echo "{{.st_pwd}}"
      - bash -
    dir: "{{.st_pwd}}"

  hooks:
    desc: Copy git hooks into .git/hooks
    silent: true
    vars:
      hooks_src: '{{.hooks_src | default (printf "%s/.taskfiles/hooks" .HOME)}}'
      hooks_dst: '{{.hooks_dst | default (printf "%s/.taskfiles/.git/hooks" .HOME)}}'
    cmds:
      - mkdir -p "{{.hooks_dst}}"
      - cp "{{.hooks_src}}/pre-commit" "{{.hooks_dst}}/pre-commit"
      - chmod +x "{{.hooks_dst}}/pre-commit"
      - echo "Installed pre-commit hook"

