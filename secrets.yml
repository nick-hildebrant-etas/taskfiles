version: "3"

env:
  SOPS_AGE_KEY_FILE: "{{.HOME}}/.config/sops/age/keys.txt"

tasks:
  doctor:
    desc: Check that secrets tooling and keys are correctly configured
    silent: true
    vars:
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
      sops_config: '{{.sops_config | default (printf "%s/.taskfiles/.sops.yaml" .HOME)}}'
      vault_file: '{{.vault_file | default (printf "%s/.taskfiles/vault.sops.yaml" .HOME)}}'
    cmds:
      - |
        FAILED=0
        pass() { printf "  [OK]   %s\n" "$1"; }
        fail() { printf "  [FAIL] %s\n" "$1"; printf "         Fix: %s\n" "$2"; FAILED=1; }

        printf "\nSecrets doctor\n"
        printf "--------------\n"

        if command -v age >/dev/null 2>&1; then
          pass "age installed ($(age --version 2>&1))"
        else
          fail "age not installed" "task brew"
        fi

        if command -v sops >/dev/null 2>&1; then
          pass "sops installed ($(sops --version 2>&1 | head -1))"
        else
          fail "sops not installed" "task brew"
        fi

        if command -v yq >/dev/null 2>&1; then
          pass "yq installed ($(yq --version 2>&1))"
        else
          fail "yq not installed" "task brew"
        fi

        if [ -f "{{.age_key_file}}" ]; then
          pass "age private key found at {{.age_key_file}}"
        else
          fail "age private key not found at {{.age_key_file}}" \
            "Restore from backup: cp <backup>/keys.txt {{.age_key_file}} && chmod 600 {{.age_key_file}}"
          printf "         Or generate a new key: task secrets:keygen\n"
        fi

        if [ -f "{{.sops_config}}" ]; then
          if grep -q "age1REPLACEME" "{{.sops_config}}"; then
            fail ".sops.yaml has placeholder public key" \
              "Replace 'age1REPLACEME' with your real public key (task secrets:keygen prints it)"
          else
            pass ".sops.yaml configured"
          fi
        else
          fail ".sops.yaml not found at {{.sops_config}}" \
            "This file must exist in the repo — check your checkout"
        fi

        if [ -f "{{.vault_file}}" ]; then
          if grep -q "^sops:" "{{.vault_file}}"; then
            pass "vault.sops.yaml exists and is SOPS-encrypted"
          else
            fail "vault.sops.yaml is NOT encrypted" "sops -e -i {{.vault_file}}"
          fi
        else
          fail "vault.sops.yaml not found at {{.vault_file}}" \
            "task secrets:edit  (creates and encrypts in one step)"
        fi

        if [ -f "{{.vault_file}}" ] && grep -q "^sops:" "{{.vault_file}}"; then
          count=$(sops -d "{{.vault_file}}" 2>/dev/null | yq '.identities | length' 2>/dev/null || echo 0)
          if [ "$count" -gt 0 ] 2>/dev/null; then
            pass "vault contains $count identity/identities"
          else
            fail "vault has no identities under .identities" "task secrets:edit"
          fi
        fi

        printf "\n"
        if [ "$FAILED" -eq 1 ]; then
          printf "Fix the issues above, then re-run: task secrets:doctor\n\n"
          exit 1
        fi
        printf "All checks passed.\n\n"

  check-key:
    desc: Verify the age private key exists (internal precondition)
    vars:
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
    preconditions:
      - sh: test -f "{{.age_key_file}}"
        msg: |
          Age private key not found at {{.age_key_file}}.
          Run 'task secrets:doctor' for full diagnostics.

  check-yq:
    desc: Verify yq is installed (internal precondition)
    preconditions:
      - sh: command -v yq
        msg: "yq not found — run: task brew"

  edit:
    desc: Edit vault.sops.yaml in-place (decrypts before opening, re-encrypts on save)
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.taskfiles/vault.sops.yaml" .HOME)}}'
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
    deps:
      - task: check-key
        vars:
          age_key_file: "{{.age_key_file}}"
    cmds:
      - sops "{{.vault_file}}"

  envgen:
    desc: Generate a flat .env from vault.sops.yaml (for tools that need KEY=VALUE format)
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.taskfiles/vault.sops.yaml" .HOME)}}'
      env_file: '{{.env_file | default (printf "%s/.taskfiles/.env" .HOME)}}'
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
    deps:
      - task: check-key
        vars:
          age_key_file: "{{.age_key_file}}"
      - task: check-yq
    cmds:
      - |
        sops -d "{{.vault_file}}" | yq '
          .identities[] |
          . as $id |
          to_entries |
          .[] |
          select(.value | type == "!!str") |
          "GITHUB_" + ($id.name | upcase) + "_" + (.key | upcase) + "=" + .value
        ' > "{{.env_file}}"
      - echo "Generated {{.env_file}}"

  keygen:
    desc: Generate a new age key
    vars:
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
      age_key_dir: '{{.age_key_dir | default (printf "%s/.config/sops/age" .HOME)}}'
      sops_config: '{{.sops_config | default (printf "%s/.taskfiles/.sops.yaml" .HOME)}}'
    cmds:
      - |
        if [ -f "{{.age_key_file}}" ]; then
          echo "Key already exists at {{.age_key_file}} — not overwriting."
          exit 0
        fi
        mkdir -p "{{.age_key_dir}}"
        age-keygen -o "{{.age_key_file}}"
        chmod 600 "{{.age_key_file}}"
        printf "\nPublic key (add to {{.sops_config}}, then re-encrypt vault.sops.yaml on a machine with the old key):\n"
        age-keygen -y "{{.age_key_file}}"
