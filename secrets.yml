version: "3"

vars:
  AGE_KEY_FILE: "{{.HOME}}/.config/sops/age/keys.txt"
  SECRETS_FILE: "{{.TASKFILES_DIR}}/secrets.yaml"
  ENV_FILE: "{{.TASKFILES_DIR}}/.env"

tasks:
  check-key:
    desc: Verify the age private key exists
    preconditions:
      - sh: test -f "{{.AGE_KEY_FILE}}"
        msg: |
          Age private key not found at {{.AGE_KEY_FILE}}.
          On a fresh machine, either:
            (A) Restore keys.txt from your password manager:
                  mkdir -p ~/.config/sops/age
                  # paste keys.txt here, then chmod 600
            (B) Generate a new key:
                  task secrets:keygen
                Then add the printed public key to .sops.yaml and
                re-encrypt secrets.yaml on a machine with the old key.

  decrypt:
    desc: Decrypt secrets.yaml into .env (run before task install)
    deps: [check-key]
    cmds:
      - sops decrypt --output-type dotenv "{{.SECRETS_FILE}}" > "{{.ENV_FILE}}"
      - echo "Decrypted secrets to {{.ENV_FILE}}"
    generates:
      - "{{.ENV_FILE}}"
    sources:
      - "{{.SECRETS_FILE}}"

  edit:
    desc: Edit secrets.yaml in-place with sops
    deps: [check-key]
    cmds:
      - sops "{{.SECRETS_FILE}}"

  encrypt-env:
    desc: One-time migration — encrypt an existing .env into secrets.yaml
    deps: [check-key]
    cmds:
      - |
        if [ ! -f "{{.ENV_FILE}}" ]; then
          echo "No .env file found at {{.ENV_FILE}}"
          exit 1
        fi
        python3 -c "
        data = {}
        with open('{{.ENV_FILE}}') as f:
            for line in f:
                line = line.strip()
                if line and not line.startswith('#') and '=' in line:
                    k, _, v = line.partition('=')
                    data[k.strip()] = v.strip()
        import yaml, sys
        sys.stdout.write(yaml.dump(data))
        " | sops --encrypt --input-type yaml --output-type yaml /dev/stdin > "{{.SECRETS_FILE}}"
        echo "Encrypted .env into {{.SECRETS_FILE}}"

  keygen:
    desc: Generate a new age key (only on a fresh machine with no backup)
    cmds:
      - |
        if [ -f "{{.AGE_KEY_FILE}}" ]; then
          echo "Key already exists at {{.AGE_KEY_FILE}} — not overwriting."
          exit 0
        fi
        mkdir -p "$(dirname "{{.AGE_KEY_FILE}}")"
        age-keygen -o "{{.AGE_KEY_FILE}}"
        chmod 600 "{{.AGE_KEY_FILE}}"
        echo ""
        echo "PUBLIC KEY (add this to .sops.yaml in the repo, then re-encrypt secrets.yaml):"
        age-keygen -y "{{.AGE_KEY_FILE}}"
