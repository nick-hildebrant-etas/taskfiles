version: "3"

vars:
  age_key_file: "{{.HOME}}/.config/sops/age/keys.txt"
  age_key_dir: "{{.HOME}}/.config/sops/age"
  secrets_file: "{{.taskfiles_dir}}/secrets.yaml"
  sops_config: "{{.taskfiles_dir}}/.sops.yaml"
  env_file: "{{.taskfiles_dir}}/.env"

tasks:
  doctor:
    desc: Check that secrets tooling and keys are correctly configured
    silent: true
    cmds:
      - |
        FAILED=0
        pass() { printf "  [OK]   %s\n" "$1"; }
        fail() { printf "  [FAIL] %s\n" "$1"; printf "         Fix: %s\n" "$2"; FAILED=1; }

        printf "\nSecrets doctor\n"
        printf -- "--------------\n"

        if command -v age >/dev/null 2>&1; then
          pass "age installed ($(age --version 2>&1))"
        else
          fail "age not installed" "task brew"
        fi

        if command -v sops >/dev/null 2>&1; then
          pass "sops installed ($(sops --version 2>&1 | head -1))"
        else
          fail "sops not installed" "task brew"
        fi

        if [ -f "{{.age_key_file}}" ]; then
          pass "age private key found at {{.age_key_file}}"
        else
          fail "age private key not found at {{.age_key_file}}" \
            "Restore from backup: cp <backup>/keys.txt {{.age_key_file}} && chmod 600 {{.age_key_file}}"
          printf "         Or generate a new key: task secrets:keygen\n"
        fi

        if [ -f "{{.sops_config}}" ]; then
          if grep -q "age1REPLACEME" "{{.sops_config}}"; then
            fail ".sops.yaml has placeholder public key" \
              "Replace 'age1REPLACEME' with your real public key (task secrets:keygen prints it)"
          else
            pass ".sops.yaml configured"
          fi
        else
          fail ".sops.yaml not found at {{.sops_config}}" \
            "This file must exist in the repo — check your checkout"
        fi

        if [ -f "{{.secrets_file}}" ]; then
          if grep -q "^sops:" "{{.secrets_file}}"; then
            pass "secrets.yaml exists and is SOPS-encrypted"
          else
            fail "secrets.yaml is NOT encrypted" "sops -e -i {{.secrets_file}}"
          fi
        else
          fail "secrets.yaml not found at {{.secrets_file}}" \
            "task secrets:edit  (creates and encrypts in one step)"
        fi

        if [ -f "{{.env_file}}" ]; then
          pass ".env exists at {{.env_file}}"
          grep -q "^GIT_EMAIL=" "{{.env_file}}" \
            && pass "GIT_EMAIL present in .env" \
            || { fail "GIT_EMAIL missing from .env" "task secrets:edit"; }
          grep -q "^GIT_NAME=" "{{.env_file}}" \
            && pass "GIT_NAME present in .env" \
            || { fail "GIT_NAME missing from .env" "task secrets:edit"; }
        else
          fail ".env not found — secrets not yet decrypted" "task secrets:decrypt"
        fi

        printf "\n"
        if [ "$FAILED" -eq 1 ]; then
          printf "Fix the issues above, then re-run: task secrets:doctor\n\n"
          exit 1
        fi
        printf "All checks passed.\n\n"

  check-key:
    desc: Verify the age private key exists (internal precondition)
    preconditions:
      - sh: test -f "{{.age_key_file}}"
        msg: |
          Age private key not found at {{.age_key_file}}.
          Run 'task secrets:doctor' for full diagnostics.

  decrypt:
    desc: Decrypt {{.secrets_file}} into {{.env_file}}
    deps: [check-key]
    cmds:
      - sops decrypt --output-type dotenv "{{.secrets_file}}" > "{{.env_file}}"
      - echo "Decrypted secrets to {{.env_file}}"
    generates:
      - "{{.env_file}}"
    sources:
      - "{{.secrets_file}}"

  edit:
    desc: Edit {{.secrets_file}} in-place (decrypts before opening, re-encrypts on save)
    deps: [check-key]
    cmds:
      - sops "{{.secrets_file}}"

  encrypt-env:
    desc: One-time migration — encrypt {{.env_file}} into {{.secrets_file}}
    deps: [check-key]
    cmds:
      - |
        if [ ! -f "{{.env_file}}" ]; then
          echo "No .env file found at {{.env_file}}"
          exit 1
        fi
        python3 -c "
        data = {}
        with open('{{.env_file}}') as f:
            for line in f:
                line = line.strip()
                if line and not line.startswith('#') and '=' in line:
                    k, _, v = line.partition('=')
                    data[k.strip()] = v.strip()
        import yaml, sys
        sys.stdout.write(yaml.dump(data))
        " | sops --encrypt --input-type yaml --output-type yaml /dev/stdin > "{{.secrets_file}}"
        echo "Encrypted {{.env_file}} into {{.secrets_file}}"

  keygen:
    desc: Generate a new age key at {{.age_key_file}}
    cmds:
      - |
        if [ -f "{{.age_key_file}}" ]; then
          echo "Key already exists at {{.age_key_file}} — not overwriting."
          exit 0
        fi
        mkdir -p "{{.age_key_dir}}"
        age-keygen -o "{{.age_key_file}}"
        chmod 600 "{{.age_key_file}}"
        printf "\nPublic key (add to {{.sops_config}}, then re-encrypt secrets.yaml on a machine with the old key):\n"
        age-keygen -y "{{.age_key_file}}"
