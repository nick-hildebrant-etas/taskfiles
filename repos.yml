version: "3"

vars:
  accounts:
    - name: personal
      dir_prefix: "{{.GITHUB_PERSONAL_DIR_PREFIX}}"
      host_alias: "{{.GITHUB_PERSONAL_HOST_ALIAS}}"
      url_prefix: "{{.GITHUB_PERSONAL_URL_PREFIX}}"
      user: "{{.GITHUB_PERSONAL_USER}}"
      token: "{{.GITHUB_PERSONAL_TOKEN}}"
      email: "{{.GITHUB_PERSONAL_EMAIL}}"
      git_name: "{{.GITHUB_PERSONAL_NAME}}"
    - name: work
      dir_prefix: "{{.GITHUB_WORK_DIR_PREFIX}}"
      host_alias: "{{.GITHUB_WORK_HOST_ALIAS}}"
      url_prefix: "{{.GITHUB_WORK_URL_PREFIX}}"
      user: "{{.GITHUB_WORK_USER}}"
      token: "{{.GITHUB_WORK_TOKEN}}"
      email: "{{.GITHUB_WORK_EMAIL}}"
      git_name: "{{.GITHUB_WORK_NAME}}"

  ws_file: '{{.VSCODE_WORKSPACE_FILE | default (printf "%s/repos.code-workspace" .HOME)}}'

  repos:
    - name: taskfiles
      dir: ~/.taskfiles
      url: https://github.com/nick-hildebrant-etas/taskfiles
    - name: score-cache
      dir: ~/work/score-cache
      url: https://github.com/nick-hildebrant-etas/score-cache
    - name: score-baselibs
      dir: ~/work/score/baselibs
      url: https://github.com/eclipse-score/baselibs

tasks:
  git-credentials:
    desc: Write ~/.git-credentials and per-account gitconfigs from vault secrets
    silent: true
    vars:
      default_git_account: work
    preconditions:
      - sh: test -f "{{.taskfiles_dir}}/.env"
        msg: ".env not found — run: task secrets:decrypt"
      - sh: '[ -n "{{.GITHUB_PERSONAL_USER}}" ]'
        msg: "GITHUB_PERSONAL_USER missing from vault — run: task secrets:edit"
      - sh: '[ -n "{{.GITHUB_WORK_USER}}" ]'
        msg: "GITHUB_WORK_USER missing from vault — run: task secrets:edit"
    cmds:
      - |
        : > ~/.git-credentials
        chmod 600 ~/.git-credentials
        {{range .accounts}}
        printf '%s\n' '{{.url_prefix | replace "https://" (printf "https://%s:%s@" .user .token)}}' >> ~/.git-credentials
        cfg="$HOME/.gitconfig-{{.name}}"
        printf '[user]\n\temail = %s\n\tname = %s\n' '{{.email}}' '{{.git_name}}' > "$cfg"
        git config --global "includeIf.gitdir:{{.dir_prefix | replace "~" $.HOME}}.path" "$cfg"
        echo "configured: {{.name}} ({{.dir_prefix}})"
        {{end}}
      - git config --global credential.helper store
      - git config --global credential.useHttpPath true
      - |
        {{range .accounts}}{{if eq .name $.default_git_account}}
        git config --global user.email '{{.email}}'
        git config --global user.name '{{.git_name}}'
        echo "global identity: {{.git_name}} <{{.email}}>"
        {{end}}{{end}}

  pull:
    desc: Pull latest on all repos (parallel)
    deps:
      - for:
          var: repos
        task: _git
        vars:
          name: "{{.ITEM.name}}"
          dir: "{{.ITEM.dir}}"
          git_args: pull

  fetch:
    desc: Fetch all repos (parallel)
    deps:
      - for:
          var: repos
        task: _git
        vars:
          name: "{{.ITEM.name}}"
          dir: "{{.ITEM.dir}}"
          git_args: fetch

  status:
    desc: Show git status for all repos (parallel)
    deps:
      - for:
          var: repos
        task: _git
        vars:
          name: "{{.ITEM.name}}"
          dir: "{{.ITEM.dir}}"
          git_args: status --short

  clone:
    desc: Clone any repos whose dir does not exist yet (parallel)
    deps:
      - for:
          var: repos
        task: _clone
        vars:
          name: "{{.ITEM.name}}"
          dir: "{{.ITEM.dir}}"
          url: "{{.ITEM.url}}"

  ws-generate:
    desc: Generate VS Code workspace file at {{.ws_file}}
    silent: true
    sources:
      - "{{.HOME}}/.taskfiles/repos.yml"
    generates:
      - '{{.ws_file | replace "~" .HOME}}'
    cmds:
      - |
        file="{{.ws_file | replace "~" .HOME}}"
        mkdir -p "$(dirname "$file")"
        printf '{\n  "folders": [\n' > "$file"
        first=1
        {{range .repos}}
        if [ "$first" = "1" ]; then first=0; else printf ',\n' >> "$file"; fi
        printf '    {"path": "%s"}' "{{.dir | replace "~" $.HOME}}" >> "$file"
        {{end}}
        printf '\n  ],\n  "settings": {}\n}\n' >> "$file"
        echo "Generated $file"

  ws-open:
    desc: Open VS Code workspace at {{.ws_file}} (regenerates if repos.yml changed)
    deps: [ws-generate]
    cmds:
      - |
        ws="{{.ws_file | replace "~" .HOME}}"
        if code "$ws" 2>/dev/null; then
          exit 0
        fi
        echo "hint: 'code' IPC unavailable (stale socket?). Open a new VS Code terminal and retry, or open manually:"
        echo "  $ws"

  _git:
    internal: true
    cmds:
      - |
        dir="{{.dir | replace "~" .HOME}}"
        if [ ! -d "$dir/.git" ]; then
          printf "==> %s: not cloned yet — run: task repos:clone\n" "{{.name}}"
          exit 1
        fi
        printf "\n==> %s\n" "{{.name}}"
        git -C "$dir" {{.git_args}}

  _clone:
    internal: true
    cmds:
      - |
        dir="{{.dir | replace "~" .HOME}}"
        if [ -d "$dir/.git" ]; then
          printf "==> %s already cloned, skipping\n" "{{.name}}"
          exit 0
        fi
        printf "\n==> cloning %s\n" "{{.name}}"
        mkdir -p "$(dirname "$dir")"
        git clone "{{.url}}" "$dir"
