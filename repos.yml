version: "3"

vars:
  ws_file: '{{.VSCODE_WORKSPACE_FILE | default (printf "%s/repos.code-workspace" .HOME)}}'

tasks:
  git-credentials:
    desc: Write ~/.git-credentials and per-identity gitconfigs from vault secrets
    silent: true
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.taskfiles/vault.sops.yaml" .HOME)}}'
      default_identity: '{{.default_identity | default "score"}}'
    deps:
      - task: secrets:check-key
      - task: secrets:check-yq
    cmds:
      - |
        vault=$(sops -d "{{.vault_file}}")
        count=$(echo "$vault" | yq '.identities | length')

        : > ~/.git-credentials
        chmod 600 ~/.git-credentials

        for i in $(seq 0 $((count - 1))); do
          name=$(echo     "$vault" | yq ".identities[$i].name")
          user=$(echo     "$vault" | yq ".identities[$i].user")
          token=$(echo    "$vault" | yq ".identities[$i].token")
          email=$(echo    "$vault" | yq ".identities[$i].email")
          git_name=$(echo "$vault" | yq ".identities[$i].git_name")
          dir=$(echo      "$vault" | yq ".identities[$i].dir" | sed "s|~|$HOME|g")

          # one credential entry per unique host across this identity's repos
          while IFS= read -r url; do
            host=$(printf '%s' "$url" | sed 's|https://||;s|/.*||')
            printf 'https://%s:%s@%s\n' "$user" "$token" "$host"
          done < <(echo "$vault" | yq ".identities[$i].repos[]") | sort -u >> ~/.git-credentials

          cfg="$HOME/.gitconfig-${name}"
          printf '[user]\n\temail = %s\n\tname = %s\n' "$email" "$git_name" > "$cfg"
          git config --global "includeIf.gitdir:${dir}/.path" "$cfg"
          echo "configured: ${name} (${dir})"
        done
      - git config --global credential.helper store
      - |
        vault=$(sops -d "{{.vault_file}}")
        default_name="{{.default_identity}}"
        email=$(echo    "$vault" | yq ".identities[] | select(.name == \"$default_name\") | .email")
        git_name=$(echo "$vault" | yq ".identities[] | select(.name == \"$default_name\") | .git_name")
        git config --global user.email "$email"
        git config --global user.name "$git_name"
        echo "global identity: $git_name <$email>"

  _git-op:
    internal: true
    silent: true
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.taskfiles/vault.sops.yaml" .HOME)}}'
      git_cmd: '{{.git_cmd}}'
      repo_lines:
        sh: sops -d "{{.vault_file}}" | yq '.identities[] | (.dir + "\t" + .repos[])'
    deps:
      - task: secrets:check-key
      - task: secrets:check-yq
    cmds:
      - for: {var: repo_lines, split: "\n"}
        cmd: |
          dir=$(echo "{{.ITEM}}" | cut -f1 | sed "s|~|$HOME|g")
          url=$(echo "{{.ITEM}}" | cut -f2)
          repo_name=$(basename "$url" .git)
          repo_dir="$dir/$repo_name"
          if [ ! -d "$repo_dir/.git" ]; then
            printf "==> %s: not cloned yet — run: task repos:clone\n" "$repo_name"
            exit 0
          fi
          printf "\n==> %s\n" "$repo_name"
          git -C "$repo_dir" {{.git_cmd}}

  clone:
    desc: Clone any repos not yet present (per identity in vault)
    silent: true
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.taskfiles/vault.sops.yaml" .HOME)}}'
      repo_lines:
        sh: sops -d "{{.vault_file}}" | yq '.identities[] | (.dir + "\t" + .repos[])'
    deps:
      - task: secrets:check-key
      - task: secrets:check-yq
    cmds:
      - for: {var: repo_lines, split: "\n"}
        cmd: |
          dir=$(echo "{{.ITEM}}" | cut -f1 | sed "s|~|$HOME|g")
          url=$(echo "{{.ITEM}}" | cut -f2)
          repo_name=$(basename "$url" .git)
          repo_dir="$dir/$repo_name"
          mkdir -p "$dir"
          if [ -d "$repo_dir/.git" ]; then
            printf "==> %s already cloned, skipping\n" "$repo_name"
          else
            printf "\n==> cloning %s\n" "$repo_name"
            git clone "$url" "$repo_dir"
          fi

  pull:
    desc: Pull latest on all repos
    silent: true
    cmds:
      - task: _git-op
        vars: {git_cmd: pull}

  fetch:
    desc: Fetch all repos
    silent: true
    cmds:
      - task: _git-op
        vars: {git_cmd: fetch}

  status:
    desc: Show git status for all repos
    silent: true
    cmds:
      - task: _git-op
        vars: {git_cmd: "status --short"}

  list:
    desc: List all repos grouped by identity
    silent: true
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.taskfiles/vault.sops.yaml" .HOME)}}'
    deps:
      - task: secrets:check-key
      - task: secrets:check-yq
    cmds:
      - |
        vault=$(sops -d "{{.vault_file}}")
        count=$(echo "$vault" | yq '.identities | length')
        for i in $(seq 0 $((count - 1))); do
          name=$(echo "$vault" | yq ".identities[$i].name")
          dir=$(echo  "$vault" | yq ".identities[$i].dir")
          printf "\n[%s]  %s\n" "$name" "$dir"
          while IFS= read -r url; do
            repo_name=$(basename "$url" .git)
            printf "  %s\n" "$repo_name"
          done < <(echo "$vault" | yq ".identities[$i].repos[]")
        done
        printf '\n'

  ws-generate:
    desc: Generate VS Code workspace file at {{.ws_file}}
    silent: true
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.taskfiles/vault.sops.yaml" .HOME)}}'
    deps:
      - task: secrets:check-key
      - task: secrets:check-yq
    cmds:
      - |
        vault=$(sops -d "{{.vault_file}}")
        count=$(echo "$vault" | yq '.identities | length')
        file="{{.ws_file | replace "~" .HOME}}"
        mkdir -p "$(dirname "$file")"

        printf '{\n  "folders": [\n' > "$file"
        first=1
        for i in $(seq 0 $((count - 1))); do
          dir=$(echo "$vault" | yq ".identities[$i].dir" | sed "s|~|$HOME|g")
          while IFS= read -r url; do
            repo_name=$(basename "$url" .git)
            if [ "$first" = "1" ]; then first=0; else printf ',\n' >> "$file"; fi
            printf '    {"path": "%s"}' "$dir/$repo_name" >> "$file"
          done < <(echo "$vault" | yq ".identities[$i].repos[]")
        done

        printf '\n  ],\n  "settings": {}\n}\n' >> "$file"
        echo "Generated $file"

  ws-open:
    desc: Open VS Code workspace at {{.ws_file}} (regenerates first)
    deps: [ws-generate]
    cmds:
      - |
        ws="{{.ws_file | replace "~" .HOME}}"
        if code "$ws" 2>/dev/null; then
          exit 0
        fi
        echo "hint: 'code' IPC unavailable (stale socket?). Open a new VS Code terminal and retry, or open manually:"
        echo "  $ws"

  doctor:
    desc: Check git credentials and per-identity config are correctly set up
    silent: true
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.taskfiles/vault.sops.yaml" .HOME)}}'
    deps:
      - task: secrets:check-key
      - task: secrets:check-yq
    cmds:
      - |
        FAILED=0
        pass() { printf "  [OK]   %s\n" "$1"; }
        fail() { printf "  [FAIL] %s\n" "$1"; printf "         Fix: %s\n" "$2"; FAILED=1; }

        printf "\nRepos doctor\n"
        printf "------------\n"

        if [ -f "$HOME/.git-credentials" ] && [ -s "$HOME/.git-credentials" ]; then
          pass "~/.git-credentials exists and is non-empty"
        else
          fail "~/.git-credentials is missing or empty" "task repos:git-credentials"
        fi

        vault=$(sops -d "{{.vault_file}}" 2>/dev/null) || { fail "failed to decrypt vault" "task secrets:doctor"; exit 1; }
        count=$(echo "$vault" | yq '.identities | length')

        for i in $(seq 0 $((count - 1))); do
          name=$(echo  "$vault" | yq ".identities[$i].name")
          user=$(echo  "$vault" | yq ".identities[$i].user")
          email=$(echo "$vault" | yq ".identities[$i].email")
          token=$(echo "$vault" | yq ".identities[$i].token")

          printf "\n  Identity: %s\n" "$name"

          if [ -n "$user" ] && [ "$user" != "null" ]; then
            pass "user: $user"
          else
            fail "user is empty for identity '$name'" "task secrets:edit"
          fi

          if [ -n "$email" ] && [ "$email" != "null" ]; then
            pass "email: $email"
          else
            fail "email is empty for identity '$name'" "task secrets:edit"
          fi

          if [ -n "$token" ] && [ "$token" != "null" ]; then
            pass "token: set"
          else
            fail "token is empty for identity '$name'" "task secrets:edit"
          fi

          cfg="$HOME/.gitconfig-${name}"
          if [ -f "$cfg" ]; then
            _email=$(git config --file "$cfg" user.email 2>/dev/null)
            _uname=$(git config --file "$cfg" user.name 2>/dev/null)
            if [ -n "$_email" ] && [ -n "$_uname" ]; then
              pass "~/.gitconfig-${name}: $_uname <$_email>"
            else
              fail "~/.gitconfig-${name} has empty values" "task repos:git-credentials"
            fi
          else
            fail "~/.gitconfig-${name} not found" "task repos:git-credentials"
          fi
        done

        printf "\n"
        if [ "$FAILED" -eq 1 ]; then
          printf "Fix the issues above, then re-run: task repos:doctor\n\n"
          exit 1
        fi
        printf "All checks passed.\n\n"
